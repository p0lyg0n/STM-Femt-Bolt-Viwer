name: Build And Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: self-hosted
    env:
      ORBBEC_SDK_DIR: C:\Program Files\OrbbecSDK 2.7.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: cmd
        run: |
          set VERSION=0.01
          if exist VERSION set /p VERSION=<VERSION
          if "%VERSION%"=="" set VERSION=0.01
          echo version=%VERSION%>>%GITHUB_OUTPUT%

      - name: Build (project script)
        shell: cmd
        run: powershell -ExecutionPolicy Bypass -File .\scripts\dev-build.ps1

      - name: Package zip
        id: pkg
        shell: cmd
        run: |
          set SHA8=%GITHUB_SHA:~0,8%
          powershell -ExecutionPolicy Bypass -File .\scripts\package_release.ps1 -Version "${{ steps.ver.outputs.version }}" -BuildDir "build" -OutputDir "release" -Suffix "%SHA8%"
          for /f %%F in ('dir /b /o-d "release\\STM-Femto-Bolt-Viewer_v${{ steps.ver.outputs.version }}_*_win64.zip"') do (
            echo package_path=release/%%F>>%GITHUB_OUTPUT%
            goto :done
          )
          echo Failed to find release zip
          exit /b 1
          :done

      - name: Release (auto main)
        if: startsWith(github.ref, 'refs/heads/main')
        uses: ncipollo/release-action@v1
        with:
          tag: auto-main
          name: Auto Build (main)
          body: |
            Automatic build from main.
            Commit: ${{ github.sha }}
            Version: ${{ steps.ver.outputs.version }}
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: ${{ steps.pkg.outputs.package_path }}

      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Stable release
            Version: ${{ steps.ver.outputs.version }}
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          artifacts: ${{ steps.pkg.outputs.package_path }}
