name: Build And Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: self-hosted
    env:
      ORBBEC_SDK_DIR: C:\Program Files\OrbbecSDK 2.7.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: powershell
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          if([string]::IsNullOrWhiteSpace($v)) { throw "VERSION is empty" }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Configure (NMake)
        shell: cmd
        run: >
          cmake -S . -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DORBBEC_SDK_DIR="%ORBBEC_SDK_DIR%"

      - name: Build
        shell: cmd
        run: cmake --build build --config Release

      - name: Package zip
        id: pkg
        shell: powershell
        run: |
          $sha = "${{ github.sha }}".Substring(0,8)
          $result = powershell -ExecutionPolicy Bypass -File .\scripts\package_release.ps1 -Version "${{ steps.ver.outputs.version }}" -BuildDir "build" -OutputDir "release" -Suffix $sha
          $line = ($result | Where-Object { $_ -like "PACKAGE_PATH=*" })[-1]
          if(-not $line) { throw "PACKAGE_PATH not found" }
          $pkg = $line.Substring("PACKAGE_PATH=".Length)
          "package_path=$pkg" >> $env:GITHUB_OUTPUT

      - name: Release (auto main)
        if: startsWith(github.ref, 'refs/heads/main')
        uses: ncipollo/release-action@v1
        with:
          tag: auto-main
          name: Auto Build (main)
          body: |
            Automatic build from main.
            Commit: ${{ github.sha }}
            Version: ${{ steps.ver.outputs.version }}
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: ${{ steps.pkg.outputs.package_path }}

      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Stable release
            Version: ${{ steps.ver.outputs.version }}
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          artifacts: ${{ steps.pkg.outputs.package_path }}
